<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bill Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-10 font-sans">
    <a href="index.html" class="text-emerald-900 font-bold hover:underline">← Back to Archive</a>
    <div id="content" class="max-w-4xl mx-auto mt-10 bg-white p-12 rounded-[40px] shadow-lg">
        <h1 class="text-4xl font-black text-slate-900">Loading details...</h1>
    </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const db = getFirestore(initializeApp({ apiKey: "AIzaSyAM4U2SUGBzq4IyWSITtmzu8ZnyrXOfFVk", projectId: "assembly-bills" }));
const id = new URLSearchParams(window.location.search).get('id');

async function load() {
    if(!id) return;
    const snap = await getDoc(doc(db, "punjab_bills", id));
    if(snap.exists()) {
        const b = snap.data();
        document.getElementById('content').innerHTML = `
            <span class="bg-emerald-100 text-emerald-800 px-4 py-1.5 rounded-full text-xs font-black uppercase">${b.cat}</span>
            <h1 class="text-5xl font-black mt-6 leading-tight">${b.title}</h1>
            <div class="mt-10 border-t pt-10">
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest">Description</h3>
                <p class="text-xl text-slate-700 mt-4 whitespace-pre-wrap leading-relaxed">${b.summary}</p>
            </div>
            <div class="mt-10 bg-emerald-50 p-8 rounded-3xl border border-emerald-100">
                <h3 class="text-sm font-bold text-emerald-800 uppercase tracking-widest">Public Impact</h3>
                <p class="text-xl text-emerald-900 mt-4 whitespace-pre-wrap leading-relaxed">${b.impact || "Analysis pending."}</p>
            </div>
        `;
    }
}
load();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clause by Clause | #1 Reference</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .bill-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        .bill-card:hover { transform: translateY(-5px); border-color: #059669; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 3px solid #064e3b; }
        .pulse { animation: pulse-animation 2s infinite; }
        @keyframes pulse-animation { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="text-slate-900">

<header class="glass sticky top-0 z-50 px-6 py-4 shadow-lg">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div class="h-12 w-12 bg-emerald-900 rounded-xl flex items-center justify-center text-white font-black shadow-lg">#1</div>
            <div>
                <h1 class="text-2xl font-black text-emerald-950 tracking-tighter uppercase">Clause by Clause</h1>
                <div class="flex items-center gap-2">
                    <div class="h-2 w-2 bg-emerald-500 rounded-full pulse"></div>
                    <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Live National Assembly Records 2021-2026</p>
                </div>
            </div>
        </div>
    </div>
</header>

<main class="max-w-7xl mx-auto px-6 py-12">
    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-12">
        <div class="lg:col-span-3 bg-white p-6 rounded-3xl shadow-xl border border-slate-200 flex flex-col md:flex-row gap-4">
            <input type="text" id="searchInput" placeholder="Search by title, category, or keyword..."
                class="flex-1 p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl">
            <select id="yearFilter" class="p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl">
                <option value="All">All Years</option>
                <option value="2026">2026</option>
                <option value="2025">2025</option>
                <option value="2024">2024</option>
            </select>
        </div>
        <div class="bg-emerald-900 rounded-3xl p-6 text-white flex items-center justify-between shadow-xl">
            <span id="billCount" class="text-5xl font-black">0</span>
        </div>
    </div>

    <div id="billsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyAM4U2SUGBzq4IyWSITtmzu8ZnyrXOfFVk",
    authDomain: "assembly-bills.firebaseapp.com",
    projectId: "assembly-bills",
    storageBucket: "assembly-bills.firebasestorage.app",
    messagingSenderId: "1038506635093",
    appId: "1:1038506635093:web:0fed6de4cd8dd6702d49dc"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
let allBills = [];

onSnapshot(collection(db, "punjab_bills"), (snapshot) => {
    allBills = snapshot.docs.map(doc => ({ firestoreId: doc.id, ...doc.data() }));
    filterData();
});

function render(data) {
    const grid = document.getElementById('billsGrid');
    document.getElementById('billCount').innerText = data.length;
    grid.innerHTML = data.map(b => `
        <div class="bill-card bg-white border border-slate-100 p-8 rounded-3xl shadow-sm hover:shadow-xl">
            <h2 class="font-black text-2xl mb-4 text-emerald-950">${b.title}</h2>
            <p class="text-slate-500 text-sm mb-6 flex-grow">${(b.summary || "").substring(0, 120)}...</p>
            <a href="bill-detail.html?id=${b.firestoreId}" class="bg-emerald-900 text-white text-center font-black py-3 rounded-xl uppercase tracking-widest text-xs hover:bg-emerald-700 transition">View Full Clause</a>
        </div>
    `).join('');
}

function filterData() {
    const searchVal = document.getElementById('searchInput').value.toLowerCase();
    const yearVal = document.getElementById('yearFilter').value;
    const filtered = allBills.filter(b => (!searchVal || b.title.toLowerCase().includes(searchVal)) && (yearVal === "All" || b.year == yearVal));
    render(filtered);
}

document.getElementById('searchInput').addEventListener('input', filterData);
document.getElementById('yearFilter').addEventListener('change', filterData);
</script>
</body>
</html>

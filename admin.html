<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Assembly</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-10">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-black mb-10">MANAGE BILLS</h1>
        
        <div class="bg-white p-8 rounded-3xl shadow-lg mb-10">
            <input type="hidden" id="editId">
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="bid" placeholder="Bill ID" class="p-4 border rounded-xl">
                <input type="number" id="byear" placeholder="Year" class="p-4 border rounded-xl">
            </div>
            <input type="text" id="btitle" placeholder="Title" class="w-full p-4 mt-4 border rounded-xl">
            <textarea id="bsum" placeholder="Summary" class="w-full p-4 mt-4 border rounded-xl h-32"></textarea>
            <textarea id="bimp" placeholder="Impact" class="w-full p-4 mt-4 border rounded-xl h-24"></textarea>
            <button id="saveBtn" class="w-full bg-emerald-900 text-white py-4 mt-4 rounded-xl font-bold hover:bg-emerald-800">SAVE BILL</button>
        </div>

        <div id="list" class="space-y-4"></div>
    </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const db = getFirestore(initializeApp({ apiKey: "AIzaSyAM4U2SUGBzq4IyWSITtmzu8ZnyrXOfFVk", projectId: "assembly-bills" }));
const billsCol = collection(db, "punjab_bills");

// 1. Listen for real-time updates
onSnapshot(billsCol, (snap) => {
    document.getElementById('list').innerHTML = snap.docs.map(d => `
        <div class="bg-white p-6 rounded-2xl shadow flex justify-between items-center">
            <div class="font-bold">${d.data().title}</div>
            <div class="flex gap-2">
                <button onclick="edit('${d.id}')" class="bg-blue-600 text-white px-4 py-2 rounded">Edit</button>
                <button onclick="del('${d.id}')" class="bg-red-600 text-white px-4 py-2 rounded">Delete</button>
            </div>
        </div>
    `).join('');
});

// 2. Save/Update Logic
document.getElementById('saveBtn').onclick = async () => {
    const editId = document.getElementById('editId').value;
    const data = {
        id: document.getElementById('bid').value,
        year: document.getElementById('byear').value,
        title: document.getElementById('btitle').value,
        summary: document.getElementById('bsum').value,
        impact: document.getElementById('bimp').value
    };

    if(editId) {
        await updateDoc(doc(db, "punjab_bills", editId), data);
        alert("Updated!");
    } else {
        await addDoc(billsCol, data);
        alert("Saved!");
    }
    // Clear form
    document.getElementById('editId').value = "";
    document.getElementById('btitle').value = "";
};

// 3. Edit Logic (Fetching current data to form)
window.edit = async (id) => {
    // We fetch the data again to ensure we have the latest content for editing
    const { getDoc } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js");
    const docSnap = await getDoc(doc(db, "punjab_bills", id));
    if(docSnap.exists()){
        const data = docSnap.data();
        document.getElementById('editId').value = id;
        document.getElementById('bid').value = data.id || "";
        document.getElementById('byear').value = data.year || "";
        document.getElementById('btitle').value = data.title || "";
        document.getElementById('bsum').value = data.summary || "";
        document.getElementById('bimp').value = data.impact || "";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
};

// 4. Delete Logic
window.del = async (id) => { 
    if(confirm("Delete this?")) await deleteDoc(doc(db, "punjab_bills", id)); 
};
</script>
</body>
</html>

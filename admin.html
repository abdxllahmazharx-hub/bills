<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex h-screen">
    <aside class="w-1/3 bg-slate-900 text-white p-6 overflow-y-auto" id="sidebarList"></aside>
    <main class="w-2/3 p-10 overflow-y-auto">
        <div class="bg-white p-8 rounded-3xl shadow-xl">
            <input type="hidden" id="editId">
            <input type="text" id="bid" placeholder="Bill ID" class="w-full p-4 mb-4 border rounded-xl"><br>
            <input type="text" id="btitle" placeholder="Title" class="w-full p-4 mb-4 border rounded-xl"><br>
            <textarea id="bsum" placeholder="Summary" class="w-full p-4 mb-4 border rounded-xl h-32"></textarea><br>
            <textarea id="bimp" placeholder="Impact" class="w-full p-4 mb-4 border rounded-xl h-20"></textarea><br>
            <button id="saveBtn" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold">SAVE BILL</button>
        </div>
    </main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const db = getFirestore(initializeApp({ apiKey: "AIzaSyAM4U2SUGBzq4IyWSITtmzu8ZnyrXOfFVk", projectId: "assembly-bills" }));

onSnapshot(collection(db, "punjab_bills"), (snap) => {
    document.getElementById('sidebarList').innerHTML = snap.docs.map(d => `
        <div class="bg-slate-800 p-4 rounded-xl mb-4">
            <h4 class="font-bold text-white mb-2">${d.data().title}</h4>
            <div class="flex gap-2">
                <button onclick="edit('${d.id}')" class="bg-blue-600 text-white px-3 py-1 rounded">Edit</button>
                <a href="bill-detail.html?id=${d.id}" target="_blank" class="bg-emerald-600 text-white px-3 py-1 rounded">View</a>
                <button onclick="del('${d.id}')" class="bg-red-600 text-white px-3 py-1 rounded">Del</button>
            </div>
        </div>
    `).join('');
});

document.getElementById('saveBtn').onclick = async () => {
    const data = { id: document.getElementById('bid').value, title: document.getElementById('btitle').value, summary: document.getElementById('bsum').value, impact: document.getElementById('bimp').value };
    const eId = document.getElementById('editId').value;
    if(eId) await updateDoc(doc(db, "punjab_bills", eId), data);
    else await addDoc(collection(db, "punjab_bills"), data);
    alert("Saved!");
};

window.edit = (id) => { /* logic to fill form */ };
window.del = async (id) => { await deleteDoc(doc(db, "punjab_bills", id)); };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | #1 Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Custom scrollbar for the sidebar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">

    <aside class="w-1/3 bg-slate-900 text-white border-r border-slate-800 flex flex-col shadow-2xl z-10">
        <div class="p-6 border-b border-slate-800">
            <h2 class="text-xl font-black text-emerald-400 flex items-center gap-3">
                <span class="bg-emerald-500 text-slate-900 px-2 py-1 rounded-md text-xs">#1</span>
                LIVE DATABASE
            </h2>
            <p class="text-[10px] text-slate-400 font-bold uppercase mt-1 tracking-widest" id="dbCount">Loading records...</p>
        </div>
        
        <div id="sidebarList" class="flex-1 overflow-y-auto p-4 space-y-3">
            </div>
    </aside>

    <main class="w-2/3 flex flex-col h-screen overflow-y-auto relative">
        <header class="bg-white px-10 py-6 border-b border-slate-200 sticky top-0 z-10 shadow-sm flex justify-between items-center">
            <h1 id="modeTitle" class="text-2xl font-black text-slate-800 tracking-tight">ADD NEW BILL</h1>
            <button id="cancelEditBtn" class="hidden text-xs font-bold bg-slate-200 text-slate-600 px-4 py-2 rounded-lg hover:bg-slate-300">CANCEL EDIT</button>
        </header>

        <div class="p-10 max-w-3xl mx-auto w-full">
            <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
                <input type="hidden" id="editId">
                
                <div class="grid grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Document ID</label>
                        <input type="text" id="bid" placeholder="e.g. ACT I 2026" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none focus:border-emerald-500 font-semibold text-slate-700">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Passage Year</label>
                        <input type="number" id="byear" placeholder="e.g. 2024" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none focus:border-emerald-500 font-semibold text-slate-700">
                    </div>
                </div>

                <div class="mb-6">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Official Title</label>
                    <input type="text" id="btitle" placeholder="The Punjab Example Act, 2024" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none focus:border-emerald-500 font-semibold text-slate-700">
                </div>

                <div class="mb-6">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Category</label>
                    <select id="bcat" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none focus:border-emerald-500 font-semibold text-slate-700 cursor-pointer">
                        <option value="Legal">Legal</option>
                        <option value="Finance">Finance</option>
                        <option value="Social">Social</option>
                        <option value="Health">Health</option>
                        <option value="Education">Education</option>
                    </select>
                </div>
                
                <div class="mb-6">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Plain Language Summary</label>
                    <textarea id="bsum" placeholder="What does this bill do?" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none h-28 focus:border-emerald-500 font-semibold text-slate-700"></textarea>
                </div>

                <div class="mb-8">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Public Impact</label>
                    <textarea id="bimp" placeholder="How does it affect the people?" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none h-20 focus:border-emerald-500 font-semibold text-slate-700"></textarea>
                </div>

                <button id="saveBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black text-lg py-5 rounded-2xl shadow-lg shadow-emerald-500/30 active:scale-95 transition-all">
                    UPLOAD TO DATABASE
                </button>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAM4U2SUGBzq4IyWSITtmzu8ZnyrXOfFVk",
            authDomain: "assembly-bills.firebaseapp.com",
            projectId: "assembly-bills",
            storageBucket: "assembly-bills.firebasestorage.app",
            messagingSenderId: "1038506635093",
            appId: "1:1038506635093:web:0fed6de4cd8dd6702d49dc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const billsCollection = collection(db, "punjab_bills");

        // UI Elements
        const saveBtn = document.getElementById('saveBtn');
        const modeTitle = document.getElementById('modeTitle');
        const cancelEditBtn = document.getElementById('cancelEditBtn');
        const formFields = ['editId', 'bid', 'byear', 'btitle', 'bcat', 'bsum', 'bimp'];
        
        // Store data locally to easily load it into the form
        window.billDataStore = {};

        // 1. LIVE LISTENER (Sidebar)
        onSnapshot(billsCollection, (snapshot) => {
            const list = document.getElementById('sidebarList');
            document.getElementById('dbCount').innerText = `${snapshot.docs.length} Records Verified`;
            
            list.innerHTML = snapshot.docs.map(document => {
                const b = document.data();
                window.billDataStore[document.id] = b; // Save data to global store
                
                return `
                <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700 hover:border-emerald-500 transition-all group">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-black text-emerald-400 bg-emerald-900/30 px-2 py-1 rounded">${b.id}</span>
                        <span class="text-[10px] font-black text-slate-500">${b.year}</span>
                    </div>
                    <h3 class="text-sm font-bold text-slate-200 mb-4 leading-tight">${b.title}</h3>
                    <div class="flex gap-2 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="editMode('${document.id}')" class="flex-1 bg-slate-700 hover:bg-blue-600 text-white text-[10px] font-black py-2 rounded-lg transition-colors">EDIT</button>
                        <button onclick="removeData('${document.id}')" class="flex-1 bg-slate-700 hover:bg-red-600 text-white text-[10px] font-black py-2 rounded-lg transition-colors">REMOVE</button>
                    </div>
                </div>
                `;
            }).join('');
        });

        // 2. ADD OR UPDATE FUNCTION
        saveBtn.addEventListener('click', async () => {
            const data = {
                id: document.getElementById('bid').value,
                year: document.getElementById('byear').value,
                title: document.getElementById('btitle').value,
                cat: document.getElementById('bcat').value,
                summary: document.getElementById('bsum').value,
                impact: document.getElementById('bimp').value
            };

            // Basic validation
            if(!data.id || !data.title) return alert("You must enter at least an ID and a Title.");

            saveBtn.innerText = "SAVING...";
            const editId = document.getElementById('editId').value;

            try {
                if (editId) {
                    await updateDoc(doc(db, "punjab_bills", editId), data);
                    clearForm();
                } else {
                    await addDoc(billsCollection, data);
                    clearForm();
                }
            } catch (error) {
                alert("Error saving: " + error.message);
            }
        });

        // 3. REMOVE FUNCTION (Triggered from Sidebar)
        window.removeData = async (docId) => {
            if(confirm("Are you sure you want to permanently DELETE this law from the archive?")) {
                await deleteDoc(doc(db, "punjab_bills", docId));
                if(document.getElementById('editId').value === docId) clearForm(); // Clear form if editing deleted item
            }
        };

        // 4. EDIT FUNCTION (Triggered from Sidebar)
        window.editMode = (docId) => {
            const b = window.billDataStore[docId];
            document.getElementById('editId').value = docId;
            document.getElementById('bid').value = b.id;
            document.getElementById('byear').value = b.year;
            document.getElementById('btitle').value = b.title;
            document.getElementById('bcat').value = b.cat || "Legal";
            document.getElementById('bsum').value = b.summary;
            document.getElementById('bimp').value = b.impact;

            modeTitle.innerText = "EDITING RECORD: " + b.id;
            modeTitle.className = "text-2xl font-black text-blue-600 tracking-tight";
            saveBtn.innerText = "UPDATE CHANGES";
            saveBtn.className = "w-full bg-blue-600 hover:bg-blue-500 text-white font-black text-lg py-5 rounded-2xl shadow-lg shadow-blue-500/30 active:scale-95 transition-all";
            cancelEditBtn.classList.remove('hidden');
        };

        // 5. RESET FORM TO DEFAULT
        const clearForm = () => {
            formFields.forEach(id => document.getElementById(id).value = "");
            modeTitle.innerText = "ADD NEW BILL";
            modeTitle.className = "text-2xl font-black text-slate-800 tracking-tight";
            saveBtn.innerText = "UPLOAD TO DATABASE";
            saveBtn.className = "w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black text-lg py-5 rounded-2xl shadow-lg shadow-emerald-500/30 active:scale-95 transition-all";
            cancelEditBtn.classList.add('hidden');
        };

        cancelEditBtn.addEventListener('click', clearForm);
    </script>
</body>
</html>
